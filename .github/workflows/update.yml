name: Update from OpenAI Codex

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Specific Codex version to package, without rust-v prefix"
        required: false

permissions:
  contents: write

concurrency:
  group: codex-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update package metadata
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          current_version="$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            target_version="${{ github.event.inputs.version }}"
          else
            target_version="$(gh release view --repo openai/codex --json tagName -q '.tagName' | sed 's/^rust-v//')"
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "target_version=$target_version" >> "$GITHUB_OUTPUT"

          if [ "$current_version" = "$target_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ./scripts/update.sh --version "$target_version"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit update
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix flake.lock
          git commit -m "chore: update codex to ${{ steps.update.outputs.target_version }}"
          git push

      - name: Summary
        if: always()
        run: |
          {
            echo "## Codex update"
            echo
            echo "- Current version: ${{ steps.update.outputs.current_version }}"
            echo "- Target version: ${{ steps.update.outputs.target_version }}"
            echo "- Changed: ${{ steps.update.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
